const state={done:new Set(),quizzes:{},curLesson:null,curStageId:null,expanded:null,quizState:null};

function totalL(){return MODULES.reduce((s,m)=>s+m.lessons.length,0);}
function isUnlocked(idx){
  if(idx===0)return true;
  const p=MODULES[idx-1];
  return p.lessons.every(l=>state.done.has(l.id))&&state.quizzes['q'+p.id]!==undefined;
}
function quizOk(id){return MODULES.find(m=>m.id===id).lessons.every(l=>state.done.has(l.id));}
function calcP(){
  const tot=totalL(),done=state.done.size,qc=Object.keys(state.quizzes).length;
  const sc=Object.values(state.quizzes);
  const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
  const pct=Math.round(done/tot*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('s1').textContent=done+'/'+tot;
  document.getElementById('s2').textContent=qc;
  document.getElementById('s3').textContent=avg!==null?avg+'%':'—';
}
function sendToBot(data){
  if(tg) tg.sendData(JSON.stringify(data));
}
function go(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  const map={modules:0,learn:1,quiz:2,certs:3};
  document.querySelectorAll('.tab')[map[name]].classList.add('on');
}
function renderMods(){
  const el=document.getElementById('mod-list');el.innerHTML='';
  MODULES.forEach((m,idx)=>{
    const ul=isUnlocked(idx);
    const allD=m.lessons.every(l=>state.done.has(l.id));
    const qD=state.quizzes['q'+m.id]!==undefined;
    const isO=state.expanded===m.id;
    let bc='b-lock',bt='Заблокировано';
    if(ul&&!allD){bc='b-act';bt='В процессе';}
    if(allD&&!qD){bc='b-act';bt='Пройти тест';}
    if(allD&&qD){bc='b-done';bt='✓ Завершён';}
    const nc=(allD&&qD)?'n-done':(ul?'n-act':'n-lock');
    const ni=(allD&&qD)?'✓':(idx+1);
    const card=document.createElement('div');card.className='mod-card';
    if(!ul)card.style.opacity='0.5';
    card.innerHTML=`<div class="mod-head" onclick="toggleM(${m.id},${ul?0:1})">
      <div class="mod-num ${nc}">${ni}</div>
      <div class="mod-inf"><div class="mod-title">${m.icon} ${m.title}</div><div class="mod-meta">${m.lessons.length} урока · ${m.time}</div></div>
      <span class="mod-badge ${bc}">${bt}</span></div>
    <div class="mod-body ${isO?'open':''}" id="mb-${m.id}">
      <div class="mod-lessons">
        ${m.lessons.map(l=>{
          const ld=state.done.has(l.id);const la=ul||ld;
          const ic=ld?'li-done':(la?'li-act':'li-lock');
          const ii=ld?'✓':(la?'📖':'🔒');
          return`<div class="les-row" onclick="openL('${l.id}',${m.id})">
            <div class="les-ico ${ic}">${ii}</div>
            <span class="les-name">${l.title}</span><span class="les-time">${l.time}</span></div>`;
        }).join('')}
        ${quizOk(m.id)?`<div class="les-row" onclick="startQ(${m.id})">
          <div class="les-ico ${qD?'li-done':'li-act'}">${qD?'✓':'📝'}</div>
          <span class="les-name" style="font-weight:600">Тест по модулю ${qD?'(пройден)':''}</span>
          <span class="les-time" style="${qD?'color:#0d7a4e':''}">${qD?state.quizzes['q'+m.id]+'%':'5 вопр.'}</span></div>`:''}
      </div></div>`;
    el.appendChild(card);
  });
}
function toggleM(id,locked){if(locked)return;state.expanded=state.expanded===id?null:id;renderMods();}
function openL(lid,mid){
  const m=MODULES.find(x=>x.id===mid);const l=m.lessons.find(x=>x.id===lid);
  state.curLesson=l;state.curStageId=mid;
  const c=l.content;
  let h=`<button class="back-btn" onclick="go('modules')">← К модулям</button>
  <div class="les-title">${l.title}</div>
  <div class="les-desc">${c.desc}</div>`;
  if(c.warn)h+=`<div class="warn-box">⚠️ ${c.warn}</div>`;
  c.secs.forEach(s=>{h+=`<div class="csec"><h3>${s.icon} ${s.title}</h3><p>${s.text}</p></div>`;});
  h+=`<div class="csec"><h3>📌 Ключевые факты</h3><div class="kfacts">${c.facts.map(f=>`<div class="kf"><strong>${f.k}</strong><span>${f.v}</span></div>`).join('')}</div></div>`;
  const isDone=state.done.has(lid);
  h+=`<button class="done-btn" id="db-${lid}" ${isDone?'disabled':''} onclick="markD('${lid}',${mid})">${isDone?'✓ Урок пройден':'Отметить как пройденный'}</button>`;
  document.getElementById('les-content').innerHTML=h;go('learn');
}
function markD(lid,mid){
  state.done.add(lid);calcP();renderMods();renderCerts();
  const db=document.getElementById('db-'+lid);
  if(db){db.disabled=true;db.textContent='✓ Урок пройден!';}
  sendToBot({action:'lesson_done',module_id:mid,lesson_id:lid});
  if(quizOk(mid)){
    const ep=document.getElementById('quiz-prompt');
    if(!ep){
      const b=document.createElement('button');b.id='quiz-prompt';b.className='done-btn';
      b.style.marginTop='8px';b.style.background='#0d7a4e';
      b.textContent='📝 Все уроки пройдены — пройти тест!';
      b.onclick=()=>startQ(mid);
      document.getElementById('les-content').appendChild(b);
    }
  }
}
function startQ(mid){
  const m=MODULES.find(x=>x.id===mid);
  state.quizState={mid,qs:m.quiz,cur:0,ans:[],answered:false};
  renderQ();go('quiz');
}
function renderQ(){
  const qs=state.quizState;const el=document.getElementById('quiz-content');
  if(!qs){el.innerHTML='<div class="empty"><p>Завершите уроки модуля чтобы открыть тест</p></div>';return;}
  if(qs.cur>=qs.qs.length){renderRes();return;}
  const q=qs.qs[qs.cur];const pct=Math.round(qs.cur/qs.qs.length*100);
  const L='АБВГ';
  const opts=q.opts.map((o,i)=>{
    let cls='';
    if(qs.answered){if(i===q.a)cls='ok';else if(i===qs.ans[qs.cur]&&i!==q.a)cls='no';}
    else if(i===qs.ans[qs.cur])cls='sel';
    return`<div class="opt ${cls}" onclick="${qs.answered?'':'selA('+qs.cur+','+i+')'}">
      <div class="opt-l">${L[i]}</div><div class="opt-t">${o}</div></div>`;
  }).join('');
  const fb=qs.answered?`<div class="fb ${qs.ans[qs.cur]===q.a?'fb-ok':'fb-no'}"><strong>${qs.ans[qs.cur]===q.a?'✓ Верно!':'✗ Неверно.'}</strong> ${q.exp}</div>`:'';
  const m=MODULES.find(x=>x.id===qs.mid);
  el.innerHTML=`<button class="back-btn" onclick="go('modules')">← К модулям</button>
  <div class="q-title">Тест: ${m.title}</div>
  <div class="qprow"><span>Вопрос ${qs.cur+1} из ${qs.qs.length}</span><span>${pct}%</span></div>
  <div class="qt"><div class="qf" style="width:${pct}%"></div></div>
  <div class="qcard"><div class="qtext">${q.q}</div>${opts}</div>
  ${fb}<button class="nxt-btn" ${qs.answered?'':'disabled'} onclick="nxtQ()">${qs.cur<qs.qs.length-1?'Следующий →':'Завершить тест →'}</button>`;
}
function selA(qi,oi){const qs=state.quizState;if(qs.answered)return;qs.ans[qi]=oi;qs.answered=true;renderQ();}
function nxtQ(){const qs=state.quizState;qs.cur++;qs.answered=qs.ans[qs.cur]!==undefined;renderQ();}
function renderRes(){
  const qs=state.quizState;
  const correct=qs.qs.filter((q,i)=>qs.ans[i]===q.a).length;
  const score=Math.round(correct/qs.qs.length*100);const pass=score>=60;
  state.quizzes['q'+qs.mid]=score;calcP();renderMods();renderCerts();
  sendToBot({action:'quiz_done',module_id:qs.mid,score:score});
  const m=MODULES.find(x=>x.id===qs.mid);
  document.getElementById('quiz-content').innerHTML=`<button class="back-btn" onclick="go('modules')">← К модулям</button>
  <div class="res-card">
    <div class="res-ring ${pass?'r-pass':'r-fail'}">${score}%</div>
    <div class="res-t">${pass?'Отлично!':'Попробуйте ещё раз'}</div>
    <div class="res-m">${pass?`Правильных ответов: <strong>${correct} из ${qs.qs.length}</strong> по модулю «${m.title}».`:`Правильных: <strong>${correct} из ${qs.qs.length}</strong>. Повторите материал и попробуйте снова.`}</div>
    <div class="res-acts">
      <button class="btn-o" onclick="startQ(${qs.mid})">↺ Повторить</button>
      <button class="btn-p" onclick="go('modules')">К модулям</button>
    </div></div>`;
}
function renderCerts(){
  const el=document.getElementById('certs-content');
  const earned=MODULES.filter(m=>state.quizzes['q'+m.id]!==undefined);
  if(!earned.length){el.innerHTML='<div class="empty"><p>🏆</p><p>Сдайте тест по любому модулю чтобы получить достижение</p></div>';return;}
  el.innerHTML=`<p style="font-size:12px;color:#888;margin-bottom:1rem">${earned.length} из ${MODULES.length} модулей завершено</p>`+
    earned.map(m=>`<div class="cert">
      <div class="cert-ico">${m.icon}</div>
      <div class="cert-info"><div class="cert-n">${m.title}</div><div class="cert-d">Завершено</div></div>
      <div class="cert-s">${state.quizzes['q'+m.id]}%</div></div>`).join('');
}
calcP();renderMods();renderCerts();
</script>
</body>
</html>
